<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadde Erkek Kuaförü</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background-image: url('/logo.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(30, 20, 15, 0.85); z-index: 1;
        }
        .container {
            position: relative; z-index: 2;
            background-color: rgba(78, 52, 46, 0.95);
            border: 2px solid #5D4037; border-radius: 16px;
            padding: 40px; width: 100%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            color: #F5DEB3; text-align: center;
        }
        h1 { font-size: 2.4rem; color: #FFFFFF; margin-bottom: 5px; font-weight: 800; }
        .subtitle { font-size: 1.1rem; color: #D7CCC8; margin-bottom: 35px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 10px; color: #F5DEB3; font-size: 1.2rem; font-weight: 600; text-align: center; }
        input, select {
            width: 100%; padding: 15px; font-size: 1.25rem;
            border-radius: 8px; border: 1px solid #5D4037;
            background-color: #3E2723; color: #FFFFFF;
            text-align: center; text-align-last: center; outline: none;
        }
        input:focus, select:focus { border-color: #8D6E63; }
        button {
            width: 100%; padding: 16px; font-size: 1.3rem; font-weight: bold;
            background-color: #8D6E63; color: white; border: none; border-radius: 8px;
            cursor: pointer; margin-top: 15px; transition: background 0.2s;
        }
        button:hover { background-color: #6D4C41; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✂️ Yusuf Kırcalı</h1>
        <div class="subtitle">Cadde Erkek Kuaförü Randevu Sistemi</div>
        
        <div class="form-group">
            <label>📅 Tarih Seçin</label>
            <input type="date" id="tarih" value="{{ bugun }}" min="{{ bugun }}">
        </div>

        <div class="form-group">
            <label>⏰ Saat Seçin</label>
            <select id="saat"></select>
        </div>

        <div class="form-group">
            <label>👤 Ad Soyad</label>
            <input type="text" id="ad_soyad" placeholder="Örn: Ahmet Yılmaz">
        </div>

        <div class="form-group">
            <label>📞 Telefon Numarası</label>
            <input type="text" id="telefon" placeholder="05XX XXX XX XX">
        </div>

        <button id="submitBtn">Randevu Oluştur</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const tarihInput = document.getElementById('tarih');
        const saatSelect = document.getElementById('saat');
        const submitBtn = document.getElementById('submitBtn');

        const TUM_SAATLER = [
            "08:30 - 09:30", "09:30 - 10:30", "10:30 - 11:30", "11:30 - 12:30",
            "12:30 - 13:30", "13:30 - 14:30", "14:30 - 15:30", "15:30 - 16:30",
            "16:30 - 17:30", "17:30 - 18:30", "18:30 - 19:30", "19:30 - 20:30"
        ];

        async function saatleriGuncelle() {
            const secilenTarih = tarihInput.value;
            saatSelect.innerHTML = '';
            TUM_SAATLER.forEach(saat => {
                const opt = document.createElement('option');
                opt.value = saat;
                opt.innerText = saat;
                saatSelect.appendChild(opt);
            });

            try {
                const response = await fetch(`/get-booked-slots?date=${secilenTarih}`);
                if (response.ok) {
                    const doluSaatler = await response.json();
                    Array.from(saatSelect.options).forEach(opt => {
                        if (doluSaatler.includes(opt.value)) {
                            saatSelect.removeChild(opt);
                        }
                    });
                }
            } catch (error) {
                console.log("Sunucu dolu saatleri getiremedi.");
            }
        }

        tarihInput.addEventListener('change', saatleriGuncelle);
        window.addEventListener('DOMContentLoaded', saatleriGuncelle);

        submitBtn.addEventListener('click', async () => {
            const ad_soyad = document.getElementById('ad_soyad').value.trim();
            const telefon = document.getElementById('telefon').value.trim();
            const tarih = tarihInput.value;
            const saat = saatSelect.value;

            if (!saat) { Swal.fire('Uyarı', 'Lütfen geçerli bir saat seçin!', 'warning'); return; }
            if (!ad_soyad || !telefon) { Swal.fire('Uyarı', 'Lütfen ad, soyad ve telefon doldurun!', 'warning'); return; }

            submitBtn.disabled = true;
            submitBtn.innerText = "Kaydediliyor...";

            try {
                const response = await fetch('/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ad_soyad, telefon, tarih, saat })
                });
                
                const rawText = await response.text(); // Sunucudan ne gelirse gelsin oku
                
                try {
                    const result = JSON.parse(rawText); // JSON'a çevirmeye çalış
                    if (result.status === 'success') {
                        Swal.fire('Başarılı!', result.message, 'success').then(() => window.location.reload());
                    } else {
                        Swal.fire('Hata', result.message, 'error');
                    }
                } catch (parseError) {
                    // Eğer JSON değilse Render çökmüş demektir, gerçek hatayı ekrana bas!
                    Swal.fire('Sunucu Çöktü!', 'Arka plan şu hatayı verdi: ' + rawText.substring(0, 150), 'error');
                }

            } catch (netError) {
                Swal.fire('Ağ Hatası', 'İnternet bağlantısı koptu.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Randevu Oluştur";
            }
        });
    </script>
</body>
</html>
